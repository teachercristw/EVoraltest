<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Vocab Star - Smartboard Edition</title>
    <style>
        :root {
            --primary: #4ECDC4;
            --primary-dark: #2A9D8F;
            --secondary: #FF6B6B;
            --secondary-dark: #C44536;
            --accent: #FFE66D;
            --accent-dark: #F4A261;
            --bg-color: #F7FFF7;
            --text-dark: #1A535C;
        }

        /* MANDATORY SMARTBOARD OPTIMIZATIONS */
        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-weight: bold;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Allow typing in specific inputs */
        input, select, textarea {
            user-select: auto;
            -webkit-user-select: auto;
            touch-action: auto;
            font-family: inherit;
            font-weight: bold;
        }

        /* Screen Management */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .screen.active { display: flex; }

        /* Aesthetics */
        h1 { font-size: clamp(3rem, 6vw, 5rem); color: var(--secondary); text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: clamp(2rem, 4vw, 3rem); background: rgba(255,255,255,0.8); padding: 15px 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }

        .form-input {
            font-size: 1.8rem; padding: 15px 20px; border: 5px solid var(--primary);
            border-radius: 20px; outline: none; text-align: center; margin-bottom: 20px;
            color: var(--text-dark); box-shadow: 0 5px 0 rgba(0,0,0,0.1); width: 80%; max-width: 400px;
        }

        /* Large Forgiving Buttons */
        .btn {
            font-size: clamp(1.5rem, 3vw, 2.5rem); padding: 20px 40px; margin: 10px; border: none;
            border-radius: 40px; background-color: var(--primary); color: white; cursor: pointer;
            box-shadow: 0 8px 0px var(--primary-dark), 0 15px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s; min-width: 250px; min-height: 80px;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 0px 0px var(--primary-dark), 0 5px 10px rgba(0,0,0,0.2); }
        .btn.start { background-color: var(--secondary); box-shadow: 0 8px 0px var(--secondary-dark); font-size: 2.5rem; }
        .btn.start:active { box-shadow: 0 0px 0px var(--secondary-dark); }

        /* Game Elements */
        #game-image {
            max-height: 35vh; max-width: 90vw; border-radius: 20px; border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin-bottom: 20px; object-fit: contain; display: none; background: white;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .option-btn { background-color: var(--accent); color: var(--text-dark); box-shadow: 0 8px 0px var(--accent-dark); word-wrap: break-word; }
        .option-btn:active { box-shadow: 0 0px 0px var(--accent-dark); }

        /* HUD & Gear Icon */
        .hud { position: absolute; top: 20px; left: 20px; font-size: 2rem; background: white; padding: 10px 25px; border-radius: 20px; color: var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #gear-btn {
            position: absolute; top: 20px; right: 20px; background: white; border: none; border-radius: 50%;
            width: 60px; height: 60px; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100; min-width: 44px; min-height: 44px; display: flex; justify-content: center; align-items: center;
        }
        #gear-btn:active { transform: scale(0.95); }

        /* Dashboard */
        #dashboard-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 83, 92, 0.98); color: white; z-index: 1000; padding: 20px;
            overflow-y: auto; touch-action: auto; font-family: Arial, sans-serif; font-weight: normal; text-align: left;
        }
        .dash-container { max-width: 900px; margin: 0 auto; background: #2B2D42; padding: 30px; border-radius: 15px; }
        .dash-container h1 { font-size: 2.5rem; text-shadow: none; color: white; margin-top:0; text-align:left;}
        
        .dash-btn { padding: 12px 20px; font-size: 1.1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px 5px 15px 0; background: var(--primary); color: white; }
        .dash-btn.danger { background: var(--secondary); }
        .dash-btn.save { background: #06D6A0; color: #111; font-size: 1.3rem; padding: 15px 30px; }
        
        .dash-q-card { background: #3B3F58; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .dash-label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9rem; color: #A0AEC0; }
        .dash-input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; font-size: 1.1rem; box-sizing: border-box; }
        .img-preview { max-width: 150px; max-height: 100px; border-radius: 8px; margin-top: 10px; display: none; object-fit: contain; background: white; }
    </style>
</head>
<body>

    <button id="gear-btn" onclick="openDashboard()">⚙️</button>
    <div id="score-hud" class="hud" style="display:none;">⭐ 0</div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <h1>ESL Vocab Star</h1>
        <h2>Enter your name to begin!</h2>
        <input type="text" id="student-name" class="form-input" placeholder="Student Name" autocomplete="off">
        <button class="btn start" onclick="startGame()">START</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <img id="game-image" src="" alt="Vocab Image">
        <h2 id="question-text">What is this?</h2>
        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen">
        <h1>Great Job! 🎉</h1>
        <h2 id="final-score">You scored X!</h2>
        <button class="btn start" onclick="resetGame()">Play Again</button>
    </div>

    <!-- TEACHER DASHBOARD -->
    <div id="dashboard-modal">
        <div class="dash-container">
            <h1>Teacher Dashboard</h1>
            <p style="color: #A0AEC0;">Questions are automatically randomized for each student.</p>
            
            <div>
                <button class="dash-btn" onclick="addQuestion()">➕ Add Question</button>
                <button class="dash-btn" style="background:#FFE66D; color:#111;" onclick="exportJSON()">💾 Export JSON</button>
                <button class="dash-btn" style="background:#FFE66D; color:#111;" onclick="document.getElementById('import-file').click()">📂 Import JSON</button>
                <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importJSON(event)">
            </div>

            <div id="editor-container">
                <!-- Editor Cards injected here -->
            </div>

            <div style="margin-top: 30px; border-top: 2px solid #555; padding-top: 20px;">
                <button class="dash-btn save" onclick="saveDashboard()">Save Settings ✅</button>
                <button class="dash-btn danger" onclick="closeDashboard()">Cancel ❌</button>
            </div>
        </div>
    </div>

<script>
// =========================================================
// AUDIO ENGINE (Web Audio API - Offline Fallback)
// =========================================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}

const sfx = {
    click: () => { initAudio(); playTone(600, 'sine', 0.1); },
    correct: () => { initAudio(); playTone(400, 'sine', 0.1); setTimeout(()=>playTone(600, 'sine', 0.15), 100); setTimeout(()=>playTone(800, 'sine', 0.2), 200); },
    wrong: () => { initAudio(); playTone(300, 'sawtooth', 0.3); setTimeout(()=>playTone(250, 'sawtooth', 0.4), 150); }
};

// =========================================================
// GAME DATA & STATE
// =========================================================
// Default fallback SVG images (works 100% offline)
const defaultSVGApple = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='55' r='40' fill='%23FF6B6B'/><path d='M50 15 Q60 5 70 15' stroke='%232A9D8F' stroke-width='5' fill='none'/></svg>";
const defaultSVGDog = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23F4A261'/><circle cx='35' cy='40' r='5' fill='black'/><circle cx='65' cy='40' r='5' fill='black'/><path d='M40 60 Q50 70 60 60' stroke='black' stroke-width='4' fill='none'/></svg>";

const defaultConfig = {
    questions: [
        { q: "What is this?", img: defaultSVGApple, correct: "Apple", wrongs: ["Banana", "Orange", "Grape"] },
        { q: "What animal is this?", img: defaultSVGDog, correct: "Dog", wrongs: ["Cat", "Bird", "Fish"] }
    ]
};

let config = JSON.parse(localStorage.getItem('vocabQuizDB')) || defaultConfig;
let drawPile = []; // The randomized deck of questions
let currentScore = 0;
let currentQuestion = null;

// =========================================================
// FISHER-YATES SHUFFLE ALGORITHM
// =========================================================
function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

// =========================================================
// CORE GAME LOGIC
// =========================================================
function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startGame() {
    sfx.click();
    const studentName = document.getElementById('student-name').value.trim();
    if(!studentName) return alert("Please enter your name first!");
    if(config.questions.length === 0) return alert("Teacher: Please add questions in the Dashboard!");
    
    currentScore = 0;
    document.getElementById('score-hud').innerText = `⭐ ${currentScore}`;
    document.getElementById('score-hud').style.display = 'block';
    
    // FIX #2: Random Distribution & Exhaustion
    // Create a fresh shuffled copy of the questions array for this student
    drawPile = shuffle(JSON.parse(JSON.stringify(config.questions))); 
    
    switchScreen('game-screen');
    nextQuestion();
}

function nextQuestion() {
    // If the draw pile is empty, the student has answered every question exactly once.
    if (drawPile.length === 0) {
        endGame();
        return;
    }
    
    // Pull the next question off the top of the shuffled deck
    currentQuestion = drawPile.pop();
    renderQuestion();
}

function renderQuestion() {
    document.getElementById('question-text').innerText = currentQuestion.q || "Choose the correct word:";
    
    const imgEl = document.getElementById('game-image');
    if(currentQuestion.img) {
        imgEl.src = currentQuestion.img;
        imgEl.style.display = 'block';
    } else {
        imgEl.style.display = 'none';
        imgEl.src = "";
    }

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    // Combine correct and wrong options, remove blanks, and shuffle the buttons
    let allOptions = [currentQuestion.correct, ...currentQuestion.wrongs].filter(opt => opt.trim() !== "");
    allOptions = shuffle(allOptions);

    allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerText = opt;
        btn.onclick = () => handleAnswer(opt, btn);
        container.appendChild(btn);
    });
}

function handleAnswer(selected, btnElement) {
    // Disable buttons to prevent double-clicking
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);

    if (selected === currentQuestion.correct) {
        sfx.correct();
        currentScore++;
        document.getElementById('score-hud').innerText = `⭐ ${currentScore}`;
        
        btnElement.style.backgroundColor = '#06D6A0'; // Green
        btnElement.style.boxShadow = '0 8px 0px #04A77B';
        
        setTimeout(nextQuestion, 1200);
    } else {
        sfx.wrong();
        btnElement.style.backgroundColor = '#FF6B6B'; // Red
        btnElement.style.boxShadow = '0 8px 0px #C44536';
        
        // Visually reveal the correct answer
        buttons.forEach(b => {
            if(b.innerText === currentQuestion.correct) {
                b.style.backgroundColor = '#06D6A0';
                b.style.boxShadow = '0 8px 0px #04A77B';
            }
        });

        setTimeout(nextQuestion, 2000); // Wait longer so they learn the correct answer
    }
}

function endGame() {
    sfx.correct();
    document.getElementById('final-score').innerText = `You scored ${currentScore} out of ${config.questions.length}!`;
    document.getElementById('score-hud').style.display = 'none';
    switchScreen('end-screen');
}

function resetGame() {
    sfx.click();
    document.getElementById('student-name').value = '';
    switchScreen('start-screen');
}

// =========================================================
// TEACHER DASHBOARD (WITH SAFE SYNCING)
// =========================================================
function openDashboard() {
    sfx.click();
    document.getElementById('dashboard-modal').style.display = 'block';
    renderEditor();
}

function closeDashboard() {
    sfx.click();
    document.getElementById('dashboard-modal').style.display = 'none';
}

function renderEditor() {
    const container = document.getElementById('editor-container');
    container.innerHTML = '';
    
    config.questions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'dash-q-card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="color:var(--primary); margin:0; background:none; box-shadow:none; padding:0;">Question ${index + 1}</h2>
                <button class="dash-btn danger" style="margin:0;" onclick="deleteQuestion(${index})">🗑️ Delete</button>
            </div>
            
            <label class="dash-label">Question Text</label>
            <input type="text" class="dash-input q-text" value="${q.q}" placeholder="e.g. What is this?">
            
            <label class="dash-label">Correct Answer</label>
            <input type="text" class="dash-input q-correct" value="${q.correct}" placeholder="Required">
            
            <label class="dash-label">Wrong Options (Up to 3)</label>
            <div style="display:flex; gap:10px;">
                <input type="text" class="dash-input q-w1" value="${q.wrongs[0] || ''}" placeholder="Wrong 1">
                <input type="text" class="dash-input q-w2" value="${q.wrongs[1] || ''}" placeholder="Wrong 2">
                <input type="text" class="dash-input q-w3" value="${q.wrongs[2] || ''}" placeholder="Wrong 3">
            </div>

            <label class="dash-label">Upload Image (Saved locally)</label>
            <input type="file" accept="image/*" class="dash-input" style="padding:0; background:none;" onchange="handleImageUpload(event, ${index})">
            <img id="preview-${index}" class="img-preview" src="${q.img || ''}" style="display: ${q.img ? 'block' : 'none'};">
        `;
        container.appendChild(card);
    });
}

// FIX #1: SAFELY SYNC DOM TO MEMORY BEFORE MUTATING ARRAY
function syncEditorToConfig() {
    const cards = document.querySelectorAll('.dash-q-card');
    config.questions = Array.from(cards).map((card, idx) => {
        return {
            q: card.querySelector('.q-text').value,
            correct: card.querySelector('.q-correct').value,
            wrongs: [
                card.querySelector('.q-w1').value,
                card.querySelector('.q-w2').value,
                card.querySelector('.q-w3').value
            ],
            // Pull image directly from current config state, as FileReader handles it asynchronously
            img: config.questions[idx]?.img || "" 
        };
    });
}

function addQuestion() {
    syncEditorToConfig(); // Lock in typed data
    config.questions.push({ q: "", img: "", correct: "", wrongs: ["", "", ""] }); // Add empty card
    renderEditor(); // Redraw UI
}

function deleteQuestion(index) {
    if(confirm("Are you sure you want to delete this question?")) {
        syncEditorToConfig(); // Lock in typed data
        config.questions.splice(index, 1); // Remove target
        renderEditor(); // Redraw UI
    }
}

// Convert uploaded image to Base64 (FileReader API)
function handleImageUpload(event, index) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            config.questions[index].img = e.target.result; // Save base64 string directly to state
            const preview = document.getElementById(`preview-${index}`);
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    }
}

function saveDashboard() {
    sfx.click();
    syncEditorToConfig(); // Final sync before saving
    localStorage.setItem('vocabQuizDB', JSON.stringify(config));
    alert("Game Settings Saved Successfully!");
    closeDashboard();
}

// Data Management: Export JSON
function exportJSON() {
    sfx.click();
    syncEditorToConfig(); // Ensure latest typed data is exported
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", "vocab_game_data.json");
    dlAnchorElem.click();
}

// Data Management: Import JSON
function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedData = JSON.parse(e.target.result);
            if(importedData.questions && Array.isArray(importedData.questions)) {
                config = importedData;
                renderEditor();
                alert("Import successful! Don't forget to click 'Save Settings ✅'.");
            } else {
                alert("Error: File format is incorrect.");
            }
        } catch (err) {
            alert("Error parsing JSON file.");
        }
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
