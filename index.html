<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESL Vocab Star</title>
    <style>
        /* MANDATORY SMARTBOARD OPTIMIZATIONS */
        body { 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Century Gothic', 'AppleGothic', sans-serif;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD166 0%, #F4A261 100%);
            color: #264653;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Prevent input issues on smartboards */
        input, select, textarea {
            user-select: auto;
            -webkit-user-select: auto;
            touch-action: auto;
            font-family: inherit;
            font-weight: bold;
        }

        /* Screen Management */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .screen.active { display: flex; }

        /* Typography & Elements */
        h1 { font-size: clamp(3rem, 6vw, 5rem); color: #E76F51; text-shadow: 3px 3px 0 #FFF; margin-bottom: 20px; }
        h2 { font-size: clamp(2rem, 4vw, 3rem); background: rgba(255,255,255,0.8); padding: 15px 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }

        .form-control {
            font-size: 1.8rem;
            padding: 15px 20px;
            border: 5px solid #2A9D8F;
            border-radius: 20px;
            margin-bottom: 20px;
            outline: none;
            background: #FFF;
            color: #264653;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }

        /* Forgiving Interactive Buttons */
        .btn {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            padding: 20px 40px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            background-color: #2A9D8F;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #21867A;
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 250px;
            min-height: 80px; /* Minimum hit area requirement */
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 #21867A; }
        .btn.start { background-color: #E76F51; box-shadow: 0 8px 0 #D45B3D; font-size: 2.5rem; }
        .btn.start:active { box-shadow: 0 0 0 #D45B3D; }

        /* Game Layout */
        #game-image {
            max-height: 30vh; max-width: 80vw;
            border-radius: 20px; border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px; display: none; object-fit: contain; background: #FFF;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .option-btn { background-color: #4ECDC4; color: #1A535C; box-shadow: 0 8px 0 #3DB8B0; }
        .option-btn:active { box-shadow: 0 0 0 #3DB8B0; }

        /* Top HUD & Gear */
        .hud { position: absolute; top: 20px; left: 20px; font-size: 2rem; background: white; padding: 10px 20px; border-radius: 20px; color: #E76F51; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        #gear-btn {
            position: absolute; top: 20px; right: 20px; background: white; border: none; border-radius: 50%; width: 60px; height: 60px;
            font-size: 30px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 100;
        }
        #gear-btn:active { transform: scale(0.95); }

        /* Dashboard Modal */
        #dashboard-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(38, 70, 83, 0.98); z-index: 200; padding: 20px; overflow-y: auto; color: white;
        }
        .dash-container { max-width: 800px; margin: 0 auto; background: #2A9D8F; padding: 30px; border-radius: 20px; }
        .dash-container h1 { font-size: 2.5rem; text-shadow: none; color: white; margin-top: 0; text-align: left;}
        .dash-label { font-size: 1.2rem; display: block; margin: 15px 0 5px 0; }
        .dash-input { width: 100%; padding: 10px; font-size: 1.2rem; border-radius: 10px; border: none; box-sizing: border-box; }
        .dash-btn { padding: 10px 20px; font-size: 1.2rem; border-radius: 10px; border: none; cursor: pointer; background: #E76F51; color: white; font-weight: bold; margin: 5px 5px 15px 0; }
        .dash-btn.safe { background: #FFD166; color: #264653; }
        .dash-btn.save { background: #4ECDC4; color: #1A535C; padding: 15px 30px; font-size: 1.5rem; }
        .q-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .img-preview { max-width: 150px; max-height: 100px; border-radius: 8px; margin-top: 10px; display: none; background: #FFF; }
        hr { border: 1px solid rgba(255,255,255,0.2); margin: 30px 0; }
    </style>
</head>
<body>

    <button id="gear-btn" onclick="openDashboard()">⚙️</button>
    <div id="score-hud" class="hud" style="display:none;">⭐ 0</div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <h1>ESL Vocab Star</h1>
        
        <select id="class-select" class="form-control">
            <option value="">-- Select Your Class --</option>
            <!-- Populated by JS -->
        </select>

        <button class="btn start" onclick="startGame()">START</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <img id="game-image" src="" alt="Vocabulary Image">
        <h2 id="question-text">What is this?</h2>
        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen" class="screen">
        <h1>Great Job! 🎉</h1>
        <h2 id="final-score">You scored X points!</h2>
        <button class="btn start" onclick="resetGame()">Play Again</button>
    </div>

    <!-- TEACHER DASHBOARD -->
    <div id="dashboard-modal">
        <div class="dash-container">
            <h1>Teacher Settings</h1>
            
            <label class="dash-label">Manage Classes (One per line)</label>
            <p style="font-size: 0.9rem; margin: 0 0 10px 0; color: #E9F5F4;">They will automatically sort alphanumerically on the home screen!</p>
            <textarea id="dash-classes" class="dash-input" style="height: 120px;" placeholder="Grade 1&#10;Grade 2&#10;Apple Class"></textarea>

            <hr>

            <h2 style="font-size: 2rem; background: none; box-shadow: none; padding: 0; color: white; text-align: left; margin-bottom: 10px;">Vocab Questions</h2>
            <button class="dash-btn safe" onclick="addQuestionCard()">➕ Add Question</button>
            <button class="dash-btn safe" onclick="exportData()">💾 Export Data</button>
            <button class="dash-btn safe" onclick="document.getElementById('import-file').click()">📂 Import Data</button>
            <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importData(event)">

            <div id="editor-container" style="margin-top: 20px;"></div>

            <hr>
            <button class="dash-btn save" onclick="saveDashboard()">Save Settings ✅</button>
            <button class="dash-btn" onclick="closeDashboard()">Cancel ❌</button>
        </div>
    </div>

<script>
// =========================================================
// AUDIO ENGINE (Web Audio API - Offline Fallback)
// =========================================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playTone(freq, type, duration, vol=0.1) {
    if(!audioCtx) return; 
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); gain.gain.setValueAtTime(vol, audioCtx.currentTime); 
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration); 
    osc.stop(audioCtx.currentTime + duration);
}

const sfx = {
    click: () => { initAudio(); playTone(600, 'sine', 0.1); },
    correct: () => { initAudio(); playTone(400, 'sine', 0.1); setTimeout(()=>playTone(600, 'sine', 0.15), 100); setTimeout(()=>playTone(800, 'sine', 0.2), 200); },
    wrong: () => { initAudio(); playTone(300, 'sawtooth', 0.3); setTimeout(()=>playTone(250, 'sawtooth', 0.4), 150); }
};

// =========================================================
// DATA & STATE MANAGEMENT
// =========================================================
// Fallback SVG data to ensure offline operation works without broken links
const defaultSVGCat = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E76F51'/><polygon points='20,30 30,10 40,30' fill='%23E76F51'/><polygon points='80,30 70,10 60,30' fill='%23E76F51'/></svg>";
const defaultSVGApple = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='55' r='40' fill='%23E76F51'/><path d='M50 15 Q60 5 70 15' stroke='%232A9D8F' stroke-width='5' fill='none'/></svg>";

const defaultConfig = {
    classes: ["Grade 1", "Grade 2", "Apple Class", "3A", "10A"],
    questions: [
        { q: "What animal is this?", img: defaultSVGCat, correct: "Cat", wrongs: ["Dog", "Bird", "Fish"] },
        { q: "What fruit is this?", img: defaultSVGApple, correct: "Apple", wrongs: ["Banana", "Orange", "Grape"] }
    ]
};

let config = JSON.parse(localStorage.getItem('vocabStarData')) || defaultConfig;
let memoryPool = [];
let currentScore = 0;
let currentQ = null;

// =========================================================
// INIT & SORTING LOGIC
// =========================================================
function populateClassDropdown() {
    const sel = document.getElementById('class-select');
    sel.innerHTML = '<option value="">-- Select Your Class --</option>';
    
    // THE CORE REQUIREMENT: Alphanumeric Natural Sorting
    // Parses numbers within strings so "10A" comes after "2A".
    let sortedClasses = [...config.classes].sort((a, b) => {
        return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
    });

    sortedClasses.forEach(c => {
        if(c.trim() === "") return;
        let opt = document.createElement('option');
        opt.value = c; opt.innerText = c;
        sel.appendChild(opt);
    });
}
window.onload = populateClassDropdown;

// =========================================================
// SMART RANDOMIZER (Fisher-Yates)
// =========================================================
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) { 
        const j = Math.floor(Math.random() * (i + 1)); 
        [array[i], array[j]] = [array[j], array[i]]; 
    }
    return array;
}

// =========================================================
// GAME FLOW
// =========================================================
function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startGame() {
    sfx.click();
    const classVal = document.getElementById('class-select').value;
    if(!classVal) return alert("Please select a class first!");
    if(config.questions.length === 0) return alert("Teacher: Please add questions in the Dashboard!");

    currentScore = 0;
    document.getElementById('score-hud').innerText = `⭐ ${currentScore}`;
    document.getElementById('score-hud').style.display = 'block';
    
    // Deep copy and shuffle into memory pool
    memoryPool = shuffle(JSON.parse(JSON.stringify(config.questions))); 
    
    switchScreen('game-screen');
    nextQuestion();
}

function nextQuestion() {
    if (memoryPool.length === 0) return endGame();
    currentQ = memoryPool.pop();
    renderQuestion();
}

function renderQuestion() {
    document.getElementById('question-text').innerText = currentQ.q || "Choose the right word:";
    
    const imgEl = document.getElementById('game-image');
    if(currentQ.img) { imgEl.src = currentQ.img; imgEl.style.display = 'block'; } 
    else { imgEl.style.display = 'none'; imgEl.src = ""; }

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    // Mix correct and wrongs, then shuffle
    let allOptions = [currentQ.correct, ...currentQ.wrongs].filter(opt => opt.trim() !== "");
    allOptions = shuffle(allOptions);

    allOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn'; btn.innerText = opt;
        btn.onclick = () => handleAnswer(opt, btn);
        container.appendChild(btn);
    });
}

function handleAnswer(selected, btn) {
    // Disable all to prevent double taps
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    if (selected === currentQ.correct) {
        sfx.correct();
        currentScore++;
        document.getElementById('score-hud').innerText = `⭐ ${currentScore}`;
        btn.style.backgroundColor = '#FFD166'; // Highlight yellow
        btn.style.color = '#E76F51';
        setTimeout(nextQuestion, 1200);
    } else {
        sfx.wrong();
        btn.style.backgroundColor = '#E76F51'; // Highlight red
        btn.style.boxShadow = '0 8px 0 #D45B3D';
        
        // Show correct answer automatically
        document.querySelectorAll('.option-btn').forEach(b => {
            if(b.innerText === currentQ.correct) {
                b.style.backgroundColor = '#FFD166'; b.style.color = '#E76F51';
            }
        });
        setTimeout(nextQuestion, 2500); // Give time to learn
    }
}

function endGame() {
    sfx.correct();
    document.getElementById('final-score').innerText = `You scored ${currentScore} out of ${config.questions.length}!`;
    document.getElementById('score-hud').style.display = 'none';
    switchScreen('end-screen');
}

function resetGame() { sfx.click(); switchScreen('start-screen'); }

// =========================================================
// TEACHER DASHBOARD & DATA MANAGEMENT
// =========================================================
function openDashboard() {
    sfx.click();
    document.getElementById('dashboard-modal').style.display = 'block';
    document.getElementById('dash-classes').value = config.classes.join('\n');
    renderEditor();
}

function closeDashboard() { sfx.click(); document.getElementById('dashboard-modal').style.display = 'none'; }

function renderEditor() {
    const container = document.getElementById('editor-container');
    container.innerHTML = '';
    
    config.questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <h3 style="margin-top:0;">Card ${index + 1}</h3>
                <button class="dash-btn" style="background:#E76F51; margin:0;" onclick="deleteCard(${index})">X</button>
            </div>
            
            <label class="dash-label">Question Text</label>
            <input type="text" class="dash-input i-q" value="${q.q}" placeholder="e.g. What is this?">
            
            <label class="dash-label">Correct Answer</label>
            <input type="text" class="dash-input i-c" value="${q.correct}" placeholder="Required">
            
            <label class="dash-label">Wrong Options (Up to 3)</label>
            <div style="display:flex; gap:10px;">
                <input type="text" class="dash-input i-w1" value="${q.wrongs[0] || ''}">
                <input type="text" class="dash-input i-w2" value="${q.wrongs[1] || ''}">
                <input type="text" class="dash-input i-w3" value="${q.wrongs[2] || ''}">
            </div>

            <label class="dash-label">Upload Image (Saved safely to file)</label>
            <input type="file" accept="image/*" style="font-size:1rem; margin-bottom:10px;" onchange="handleImage(event, ${index})">
            <img id="preview-${index}" class="img-preview" src="${q.img || ''}" style="display: ${q.img ? 'block' : 'none'};">
        `;
        container.appendChild(div);
    });
}

function addQuestionCard() {
    syncEditorToConfig();
    config.questions.push({ q: "", img: "", correct: "", wrongs: ["", "", ""] });
    renderEditor();
}

function deleteCard(idx) {
    if(confirm("Delete this card?")) {
        syncEditorToConfig();
        config.questions.splice(idx, 1);
        renderEditor();
    }
}

// Convert image to Base64 via FileReader
function handleImage(event, index) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            config.questions[index].img = e.target.result;
            const preview = document.getElementById(`preview-${index}`);
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    }
}

function syncEditorToConfig() {
    let newCards = [];
    document.querySelectorAll('#editor-container .q-card').forEach((cardDom, idx) => {
        newCards.push({
            q: cardDom.querySelector('.i-q').value,
            img: config.questions[idx].img, // Retain base64 state
            correct: cardDom.querySelector('.i-c').value,
            wrongs: [
                cardDom.querySelector('.i-w1').value,
                cardDom.querySelector('.i-w2').value,
                cardDom.querySelector('.i-w3').value
            ]
        });
    });
    config.questions = newCards;
}

function saveDashboard() {
    sfx.click();
    syncEditorToConfig();
    
    // Save classes, filtering empties
    const classText = document.getElementById('dash-classes').value;
    config.classes = classText.split('\n').map(c => c.trim()).filter(c => c !== "");
    
    localStorage.setItem('vocabStarData', JSON.stringify(config));
    populateClassDropdown();
    alert("Settings Saved!");
    closeDashboard();
}

// File I/O for Teacher Data portability
function exportData() {
    sfx.click(); syncEditorToConfig();
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config));
    const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "vocab_game_settings.json"); a.click();
}

function importData(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if(imported.questions && imported.classes) {
                config = imported;
                document.getElementById('dash-classes').value = config.classes.join('\n');
                renderEditor();
                alert("Import successful! Click 'Save Settings' to apply.");
            } else { alert("Invalid file format."); }
        } catch (err) { alert("Error reading file."); }
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
